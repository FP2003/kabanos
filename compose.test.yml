services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kabanos
      POSTGRES_PASSWORD: kabanos
      POSTGRES_DB: kabanos
    ports: ["55432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kabanos"]
      interval: 2s
      timeout: 2s
      retries: 20
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_USER: kabanos
      MYSQL_PASSWORD: kabanos
      MYSQL_DATABASE: kabanos
      MYSQL_ROOT_PASSWORD: root
    ports: ["53306:3306"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 3s
      timeout: 3s
      retries: 30
